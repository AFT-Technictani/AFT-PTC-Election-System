<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- ใส่ชื่อเว็บไซต์ -->
  <title>ระบบเลือกตั้งนายกองค์การนักวิชาชีพฯ วิทยาลัยเทคนิคปัตตานี</title>

  <!-- ใส่โลโก้ (Favicon) -->
  <link rel="icon" type="image/png" href="https://lh5.googleusercontent.com/d/1WjbuEgLhA21hRRqFtSgNLWrYWP94K8NM">

  <!-- ดึงฟอนต์ Prompt จาก Google Fonts ให้หน้าเว็บดูสวยงาม -->
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* ตั้งค่าพื้นหลังและจัดให้อยู่กึ่งกลาง */
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Prompt', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* กล่องข้อความสีขาว */
    .maintenance-card {
      background-color: #ffffff;
      padding: 50px 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
      max-width: 450px;
      width: 85%;
    }

    /* ไอคอนแจ้งเตือน */
    .icon {
      font-size: 65px;
      margin-bottom: 20px;
      color: #ff9800;
    }

    /* หัวข้อหลัก */
    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #2c3e50;
      margin: 0 0 15px 0;
    }

    /* ข้อความรายละเอียด */
    p {
      font-size: 15px;
      font-weight: 300;
      color: #666666;
      line-height: 1.6;
      margin: 0;
    }

    /* อนิเมชันวงกลมโหลดข้อมูล */
    .spinner {
      margin: 30px auto 0;
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="maintenance-card">
    <div class="icon">🚧</div>
    <h1>ขออภัย ระบบกำลังปิดปรับปรุง</h1>
    <p>ระบบเลือกตั้งนายกองค์การนักวิชาชีพฯ<br>วิทยาลัยเทคนิคปัตตานี<br>กำลังดำเนินการอัปเดตเพื่อเพิ่มประสิทธิภาพ<br>กรุณากลับมาใช้งานใหม่อีกครั้งในภายหลัง</p>
    <div class="spinner"></div>
  </div>

</body>
</html>
