<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base target="_top">

  <title>ระบบเลือกตั้งนายกองค์การนักวิชาชีพฯ วิทยาลัยเทคนิคปัตตานี</title>

  <link rel="icon" type="image/png" href="https://lh5.googleusercontent.com/d/1WjbuEgLhA21hRRqFtSgNLWrYWP94K8NM">

  <style>
    /* ตั้งค่าไม่ให้มีขอบขาว */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Sarabun', sans-serif; /* แนะนำให้ใช้ฟอนต์ภาษาไทย */
    }

    /* CSS สำหรับหน้าจอโหลด (Splash Screen) */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #2c2c2c; /* สีพื้นหลังโทนเข้มให้เข้ากับรูปภาพ */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: white;
      text-align: center;
    }

    /* CSS สำหรับรูปภาพ */
    #splash-screen img {
      max-width: 90%;
      max-height: 70vh;
      object-fit: contain;
      margin-bottom: 20px;
    }

    /* CSS สำหรับ Iframe */
    #main-iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: none; /* ซ่อนไว้ก่อนจนกว่าจะนับถอยหลังเสร็จ */
    }
  </style>
</head>
<body>

  <div id="splash-screen">
    <img src="https://lh5.googleusercontent.com/d/15as2XiAMTMhmKvGb1yKRCpUADcio7Kqc" alt="น้อมรำลึก">
    
    <h3>กำลังเข้าสู่เว็บไซต์ใน <span id="countdown">5</span> วินาที...</h3>
  </div>

  <iframe 
    id="main-iframe"
    src="https://script.google.com/macros/s/AKfycbzMaOeUgPgYHXWSsKuMyJGDelhhx06Fd_RwU9pwZIZagyZanX2kS_pe5lWiZoqgwKm0GQ/exec">
  </iframe>

  <script>
    // ตั้งค่าเวลาเริ่มต้น (วินาที)
    let timeLeft = 5;
    
    // ดึง Element ต่างๆ มาเพื่อจัดการ
    const countdownElement = document.getElementById('countdown');
    const splashScreen = document.getElementById('splash-screen');
    const mainIframe = document.getElementById('main-iframe');

    // สร้างฟังก์ชันนับถอยหลังทุกๆ 1 วินาที (1000 มิลลิวินาที)
    const timer = setInterval(() => {
      timeLeft--; // ลดเวลาลง 1 วินาที
      countdownElement.textContent = timeLeft; // อัปเดตตัวเลขบนหน้าเว็บ

      // เมื่อเวลาหมด (เท่ากับหรือน้อยกว่า 0)
      if (timeLeft <= 0) {
        clearInterval(timer); // หยุดการนับเวลา
        splashScreen.style.display = 'none'; // ซ่อนหน้าโหลด
        mainIframe.style.display = 'block'; // แสดง Iframe
      }
    }, 1000);
  </script>

</body>
</html>
