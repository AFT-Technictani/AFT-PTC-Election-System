<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base target="_top">

  <title>ระบบเลือกตั้งนายกองค์การนักวิชาชีพฯ วิทยาลัยเทคนิคปัตตานี</title>

  <meta property="og:title" content="ระบบเลือกตั้งนายกองค์การนักวิชาชีพฯ วิทยาลัยเทคนิคปัตตานี">
  <meta property="og:description" content="หน้าต่างสำหรับเข้าสู่ระบบเลือกตั้งออนไลน์">
  <meta property="og:image" content="https://lh5.googleusercontent.com/d/1qqV_78t0QfNSTvKM9oyloD5h618rlwUB">
  <meta property="og:type" content="website">

  <link rel="icon" type="image/png" href="https://lh5.googleusercontent.com/d/1WjbuEgLhA21hRRqFtSgNLWrYWP94K8NM">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }

    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #2c2c2c; 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: white;
      text-align: center;
    }

    #splash-screen img {
      max-width: 90%;
      max-height: 70vh;
      object-fit: contain;
      margin-bottom: 20px;
    }

    #main-iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: none; 
    }
  </style>
</head>
<body>

  <div id="splash-screen">
    <img src="https://lh5.googleusercontent.com/d/1qqV_78t0QfNSTvKM9oyloD5h618rlwUB" alt="น้อมรำลึก">
    <h3>กำลังเข้าสู่เว็บไซต์ใน <span id="countdown">5</span> วินาที...</h3>
  </div>

  <iframe 
    id="main-iframe"
    src="https://script.google.com/macros/s/AKfycbzMaOeUgPgYHXWSsKuMyJGDelhhx06Fd_RwU9pwZIZagyZanX2kS_pe5lWiZoqgwKm0GQ/exec">
  </iframe>

  <script>
    let timeLeft = 5;
    const countdownElement = document.getElementById('countdown');
    const splashScreen = document.getElementById('splash-screen');
    const mainIframe = document.getElementById('main-iframe');

    const timer = setInterval(() => {
      timeLeft--;
      countdownElement.textContent = timeLeft;

      if (timeLeft <= 0) {
        clearInterval(timer);
        splashScreen.style.display = 'none';
        mainIframe.style.display = 'block';
      }
    }, 1000);
  </script>

</body>
</html>
